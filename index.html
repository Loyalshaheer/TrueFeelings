<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Princesses - Maryam & Sana</title>
    <!-- Premium Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Noto+Nastaliq+Urdu:wght@400;700&family=Poppins:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="heart-container"></div>

    <div class="glass-container" id="main-card">
        <h1 class="title">My Truest Apology</h1>

        <div class="message-container">
            <p id="typed-text"></p>
        </div>

        <div class="action-buttons hide" id="action-buttons">
            <p class="question">What is your answer, my princesses?</p>
            <div class="buttons">
                <button class="btn btn-love" id="btn-love">We Accept Your Love 💞</button>
                <button class="btn btn-reject" id="btn-reject">We Do Not 💔</button>
            </div>
        </div>
    </div>

    <!-- Modals / Popups -->
    <div class="modal hide" id="modal-love">
        <div class="modal-content">
            <h2>My Life is Complete! 💞</h2>
            <p>My pure intentions are finally succeeding! I can't wait for the day we do Nikah and our souls unite
                forever. I love you both so much!</p>
            <div class="modal-emojis">💞 💍 ❤️</div>
            <button class="btn-close" onclick="closePopups()">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
